version: '3.9'

services:

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://auditex:auditex_dev_pw@postgres:5432/auditex
      REDIS_URL: redis://redis:6379/0
      POSTGRES_USER: auditex
      POSTGRES_PASSWORD: auditex_dev_pw
      POSTGRES_DB: auditex
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: dev_secret
      API_KEY_SALT: dev_salt
      FOXMQ_BROKER_URL: mqtt://foxmq:1883
      VERTEX_NODE_URL: http://localhost:8545
      VERTEX_PRIVATE_KEY: placeholder
      USE_REAL_VERTEX: "true"
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      foxmq:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://auditex:auditex_dev_pw@postgres:5432/auditex
      REDIS_URL: redis://redis:6379/0
      POSTGRES_USER: auditex
      POSTGRES_PASSWORD: auditex_dev_pw
      POSTGRES_DB: auditex
      ENVIRONMENT: development
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: dev_secret
      API_KEY_SALT: dev_salt
      FOXMQ_BROKER_URL: mqtt://foxmq:1883
      VERTEX_NODE_URL: http://localhost:8545
      VERTEX_PRIVATE_KEY: placeholder
      USE_REAL_VERTEX: "true"
      PYTHONPATH: /app
    depends_on:
      - redis
      - postgres
      - foxmq
    volumes:
      - ./backend:/app
    command: celery -A workers.celery_app worker --loglevel=info -Q execution_queue,review_queue,reporting_queue,dlq

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_API_KEY: auditex-test-key-phase2
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auditex
      POSTGRES_PASSWORD: auditex_dev_pw
      POSTGRES_DB: auditex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auditex -d auditex"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  foxmq:
    build:
      context: ./foxmq
      dockerfile: Dockerfile
    ports:
      - "1883:1883"
      - "19793:19793/udp"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/1883' 2>/dev/null && echo healthy || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
