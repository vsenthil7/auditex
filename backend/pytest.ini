[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
norecursedirs = _backup .git .venv __pycache__ node_modules migrations alembic scripts coverage_html
addopts =
    -ra
    --strict-markers
    --disable-warnings

[coverage:run]
branch = false
source = .
omit =
    tests/*
    scripts/*
    db/migrations/*
    alembic.ini
    workers/celery_app.py
    *_backup/*

[coverage:report]
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.:
    raise NotImplementedError
    if TYPE_CHECKING:
    except ImportError:
